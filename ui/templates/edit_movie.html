{% extends "layout.html" %}
{% block content %}
<div class="card">
    <h2>Chỉnh sửa thông tin Phim</h2>
    <form action="/movies/edit/{{ movie.id }}" method="POST">
        <div style="display: grid; gap: 15px;">
            <div>
                <label>Tên phim:</label>
                <input type="text" name="title" value="{{ movie.title }}" required style="width: 100%; padding: 10px;">
            </div>
            <div>
                <label>Năm phát hành:</label>
                <input type="number" name="year" value="{{ movie.year }}" required style="width: 100%; padding: 10px;">
            </div>
            <div>
                <label>Doanh thu ($):</label>
                <input type="number" step="1" name="revenue" value="{{ movie.revenue }}" required style="width: 100%; padding: 10px;">
            </div>
            <div>
                <label>Đạo diễn:</label>
                <select name="director_id" style="width: 100%; padding: 10px;">
                    {% for d in directors %}
                    <option value="{{ d.id }}" {% if d.id == movie.director_id %}selected{% endif %}>{{ d.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div style="margin-top: 10px;">
                <button type="submit" class="btn btn-success">Cập nhật</button>
                <a href="/movies" class="btn" style="background: #ccc; color: black; margin-left: 10px;">Hủy bỏ</a>
            </div>
        </div>
    </form>
</div>
{% endblock %}
